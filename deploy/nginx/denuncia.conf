server {
    listen 80;
    server_name ejemplo.cl;
    root /var/www/denuncia;
    index index.php;

    client_max_body_size 20M;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Sensitive files and folders
    location ~ /\. { deny all; }
    location ~* \.(sql|zip|bak|ini|log|md)$ { deny all; }
    location = /config_denuncia.php { deny all; }
    location ^~ /deploy/ { deny all; }
    location ^~ /storage/ { deny all; }
    location ^~ /outbox/ { deny all; }
    location ^~ /phpmailer/ { deny all; }

    # Force attachments through PHP controller only
    location ^~ /uploads/ { deny all; }

    # Static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_index index.php;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_read_timeout 60s;
    }
}
